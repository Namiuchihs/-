<h2>川之江太鼓台の紹介</h2>
<p>川之江太鼓台は重さ約2トン、長さ12mの豪華な装飾が特徴です。地域の伝統文化を感じられる祭りです。</p>
<h2>ギャラリー</h2>
<p>祭りのハイライト：太鼓台が街を練り歩く迫力の瞬間。</p>
<h2>イベント概要</h2>
<p>10月13日〜15日までの3日間、各町の太鼓台が練り歩きます。</p>
