<h2>起源</h2>
<p>
太鼓台は江戸時代から続く伝統的な祭礼文化です。
</p>

<h2>川之江の歴史</h2>
<p>
川之江では約200年以上の歴史があり、
地域の祭りとして受け継がれています。
</p>

<h2>現在</h2>
<p>
現在では四国を代表する祭りとして多くの人が訪れます。
</p>
